<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Performance: theme-color + color-scheme for early paint -->
    <meta name="theme-color" content="#0a0a0f" />
    <meta name="color-scheme" content="dark light" />
    <meta name="application-name" content="ZeroDay Guardian" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="ZeroDay Guardian" />
    <meta name="format-detection" content="telephone=no" />

    <!-- Critical: Inline CSS variables for faster LCP -->
    <style>
      :root{--theme-bg:#0a0a0f;--theme-accent-blue:#00d4ff;--theme-accent-green:#00ff88;--theme-text:#e2e8f0}
    </style>

    <title>ZeroDay Guardian | Deploy Your Cyber-AI Workspace</title>
    <meta
      name="description"
      content="ZeroDay Guardian is a premium cyber-AI SaaS for labs, missions, OSINT, guided learning, and adaptive security mentorship."
    />
    <meta
      name="keywords"
      content="cybersecurity training, AI cyber mentor, OSINT platform, cybersecurity labs, threat intelligence, ethical hacking, ZeroDay Guardian, cyber SaaS"
    />
    <meta name="author" content="ZeroDay Guardian" />
    <meta name="robots" content="index, follow, max-image-preview:large" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />

    <!-- Open Graph -->
    <meta property="og:title" content="ZeroDay Guardian | Deploy Your Cyber-AI Workspace" />
    <meta
      property="og:description"
      content="Deploy labs, missions, OSINT workflows, and ZORVIX AI guidance inside one production-grade cybersecurity workspace."
    />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Zero Day Guardian" />
    <meta property="og:locale" content="en_US" />
    <meta property="og:url" content="https://zerodayguardian-delta.vercel.app/" />
    <meta property="og:image" content="/og-image.png" />
    <meta property="og:image:alt" content="ZeroDay Guardian - AI Cybersecurity Platform" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="ZeroDay Guardian | Deploy Your Cyber-AI Workspace" />
    <meta
      name="twitter:description"
      content="Premium cyber labs, adaptive missions, OSINT workflows, and ZORVIX AI guidance for serious security learners."
    />
    <meta name="twitter:image" content="/og-image.png" />
    <link rel="canonical" href="https://zerodayguardian-delta.vercel.app/" />

    <!-- Favicon (inline SVG for zero network requests) -->
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%230a0a0f'/%3E%3Cpath d='M16 18h32v6L26 46h22v6H16v-6l22-22H16z' fill='%2300ff88'/%3E%3C/svg%3E"
    />

    <!-- Performance: Resource hints + preconnects -->
    <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
    <link rel="dns-prefetch" href="https://fonts.gstatic.com" />
    <link rel="dns-prefetch" href="https://firestore.googleapis.com" />
    <link rel="dns-prefetch" href="https://identitytoolkit.googleapis.com" />
    <link rel="dns-prefetch" href="https://securetoken.googleapis.com" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://firestore.googleapis.com" crossorigin />
    <link rel="preconnect" href="https://identitytoolkit.googleapis.com" crossorigin />
    <link rel="preconnect" href="https://securetoken.googleapis.com" crossorigin />

    <!-- Performance: Google Fonts non-blocking (preload + onload swap) -->
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700;800&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'" />
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700;800&display=swap" /></noscript>
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@graph": [
          {
            "@type": "Organization",
            "name": "ZeroDay Guardian",
            "url": "https://zerodayguardian-delta.vercel.app/",
            "logo": "https://zerodayguardian-delta.vercel.app/favicon.ico",
            "email": "ksubhraj28@gmail.com",
            "description": "A premium cyber-AI SaaS platform for guided labs, missions, OSINT, and adaptive mentorship."
          },
          {
            "@type": "WebSite",
            "name": "ZeroDay Guardian",
            "url": "https://zerodayguardian-delta.vercel.app/",
            "potentialAction": {
              "@type": "SearchAction",
              "target": "https://zerodayguardian-delta.vercel.app/tools?q={search_term_string}",
              "query-input": "required name=search_term_string"
            }
          },
          {
            "@type": "WebApplication",
            "name": "ZeroDay Guardian",
            "applicationCategory": "SecurityApplication",
            "operatingSystem": "Web",
            "url": "https://zerodayguardian-delta.vercel.app/",
            "description": "Cyber-AI SaaS for labs, missions, OSINT workflows, guided learning, and adaptive mentorship."
          }
        ]
      }
    </script>

    <!-- CSP is enforced primarily via HTTP headers (vercel.json + api/index.mjs with per-request nonce). -->
    <!-- This meta-tag aligns with the HTTP header to prevent conflicts. api/index.mjs strips this tag for HTML responses and injects a nonce-based CSP instead. -->
    <!-- CSP is enforced via HTTP header (vercel.json + api/index.mjs nonce). frame-ancestors is ignored in meta tags per spec; handled by HTTP header only. -->

    <!-- Vite injects modulepreload for entry points automatically during build -->
  </head>
  <body>
    <noscript>
      <strong>ZeroDay Guardian needs JavaScript enabled to deploy the cyber workspace correctly.</strong>
    </noscript>
    <div id="root"></div>
    <!-- Performance: Defer non-critical script, module scripts are deferred by default -->
    <script type="module" src="/src/main.tsx" crossorigin="anonymous"></script>
  </body>
</html>
