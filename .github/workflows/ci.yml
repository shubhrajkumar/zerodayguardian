name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  VITE_API_URL: https://zerodayguardian-backend.onrender.com
  VITE_APP_NAME: ZeroDay Guardian
  VITE_APP_VERSION: 1.0.0

jobs:
  # ── Job 1: Type checking (fast, catches type errors early) ──
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci --prefer-offline

      - name: TypeScript typecheck
        run: npx tsc -p tsconfig.app.json --noEmit
        env:
          CI: true

  # ── Job 2: Linting (fast, catches code style issues) ──
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci --prefer-offline

      - name: ESLint
        run: npm run lint
        env:
          CI: true

  # ── Job 3: Unit tests ──
  test:
    name: Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci --prefer-offline

      - name: Unit tests
        run: npx vitest run --config vitest.config.mjs
        env:
          CI: true

  # ── Job 4: Build ──
  build:
    name: Build & Verify
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci --prefer-offline

      - name: Create env file
        run: |
          cat > .env << 'ENVEOF'
          VITE_API_URL=https://zerodayguardian-backend.onrender.com
          VITE_APP_NAME=ZeroDay Guardian
          VITE_APP_VERSION=1.0.0
          ENVEOF

      - name: Production build
        run: npm run build
        env:
          NODE_ENV: production
          CI: false

      - name: Verify build output
        run: |
          if [ -d "dist" ] && [ -f "dist/index.html" ]; then
            echo "✅ Build output verified"
            echo "### Build Output ✅" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            ls -lh dist/assets/*.js 2>/dev/null | head -15 >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Build failed — dist/index.html missing"
            exit 1
          fi

  # ── Job 5: CI Summary (runs after all gates) ──
  summary:
    name: CI Summary
    needs: [typecheck, lint, test, build]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Generate CI Summary
        run: |
          echo "## 🛡️ ZeroDay Guardian — CI Pipeline Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Gate | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Typecheck | ${{ needs.typecheck.result == 'success' && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Lint | ${{ needs.lint.result == 'success' && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Tests | ${{ needs.test.result == 'success' && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Build | ${{ needs.build.result == 'success' && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          ALL_PASS=true
          for result in "${{ needs.typecheck.result }}" "${{ needs.lint.result }}" "${{ needs.test.result }}" "${{ needs.build.result }}"; do
            if [ "$result" != "success" ]; then
              ALL_PASS=false
              break
            fi
          done

          if [ "$ALL_PASS" = true ]; then
            echo "### ✅ All quality gates passed — ready to merge" >> $GITHUB_STEP_SUMMARY
          else
            echo "### ❌ One or more quality gates failed — fix before merging" >> $GITHUB_STEP_SUMMARY
          fi
