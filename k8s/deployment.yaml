# ──────────────────────────────────────────────
# ZeroDay Guardian — Kubernetes Deployment
# ──────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: zeroday-guardian
  namespace: default
  labels:
    app: zeroday-guardian
    tier: frontend
    managed-by: kustomize
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: zeroday-guardian
  template:
    metadata:
      labels:
        app: zeroday-guardian
        tier: frontend
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: app
          image: zeroday-guardian:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: http
              protocol: TCP
            - containerPort: 8787
              name: neurobot
              protocol: TCP
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          env:
            - name: NODE_ENV
              value: "production"
            - name: CORS_ORIGIN
              value: "https://zerodayguardian-delta.vercel.app"
            - name: TRUST_PROXY
              value: "true"
            - name: LLM_API_KEY
              valueFrom:
                secretKeyRef:
                  name: zdg-secrets
                  key: llm-api-key
            - name: SESSION_SECRET
              valueFrom:
                secretKeyRef:
                  name: zdg-secrets
                  key: session-secret
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: zdg-secrets
                  key: jwt-secret
            - name: MONGODB_URI
              valueFrom:
                secretKeyRef:
                  name: zdg-secrets
                  key: mongodb-uri
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: zdg-secrets
                  key: redis-url
            - name: SENTRY_DSN
              valueFrom:
                secretKeyRef:
                  name: zdg-secrets
                  key: sentry-dsn
            - name: OTEL_SERVICE_NAME
              value: "zeroday-guardian"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://otel-collector:4318"
          startupProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /api/health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 15
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - zeroday-guardian
                topologyKey: kubernetes.io/hostname
---
# ──────────────────────────────────────────────
# Service
# ──────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: zeroday-guardian-service
  labels:
    app: zeroday-guardian
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 8080
      protocol: TCP
      name: http
    - port: 8787
      targetPort: 8787
      protocol: TCP
      name: neurobot
  selector:
    app: zeroday-guardian
---
# ──────────────────────────────────────────────
# HorizontalPodAutoscaler
# ──────────────────────────────────────────────
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: zeroday-guardian-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: zeroday-guardian
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
---
# ──────────────────────────────────────────────
# Ingress (production-ready with TLS)
# ──────────────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: zeroday-guardian-ingress
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-buffer-size: "8k"
spec:
  tls:
    - hosts:
        - zerodayguardian-delta.vercel.app
      secretName: zdg-tls
  rules:
    - host: zerodayguardian-delta.vercel.app
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: zeroday-guardian-service
                port:
                  number: 80
