name: ZeroDay Guardian — Build & Deploy

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    name: Build Application
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci --prefer-offline

      - name: Create env file
        run: |
          echo "VITE_API_URL=https://zerodayguardian-backend.onrender.com" >> .env
          echo "VITE_APP_NAME=ZeroDay Guardian" >> .env

      - name: Build Production Bundle
        run: npm run build
        env:
          NODE_ENV: production
          VITE_API_URL: https://zerodayguardian-backend.onrender.com

      - name: Verify Build Output
        run: |
          if [ -d "dist" ]; then
            echo "✅ Build successful"
            ls -la dist/
          else
            echo "❌ Build failed — dist folder missing"
            exit 1
          fi
