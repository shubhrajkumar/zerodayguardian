<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Powerful Dashboard</title>
    <style>
      body { margin:0;font-family:sans-serif;overflow:hidden; }
      #root { position:relative; width:100vw; height:100vh; }
      .fade-in { animation:fadeIn .3s ease forwards; }
      @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
      .loading-overlay { position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.85);color:#fff;display:flex;align-items:center;justify-content:center;font-size:1.5rem;z-index:9999; }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="loading-overlay" id="loader">Initializing Security System…</div>
    </div>
    <script type="module" src="js/app.js"></script>
  </body>
</html>
