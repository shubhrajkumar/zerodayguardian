name: Weekly Security Audit

on:
  schedule:
    - cron: "0 4 * * 1"
  workflow_dispatch:

jobs:
  audit:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run production security audit
        id: audit
        run: npm audit --omit=dev --audit-level=high

      - name: Open issue on audit failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const title = "Security audit detected high severity vulnerabilities";
            const body = [
              "Automated weekly audit detected one or more high-severity vulnerabilities.",
              "",
              `Workflow run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              "",
              "Action required: review dependencies and patch affected packages."
            ].join("\n");
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ["security", "dependencies"]
            });
