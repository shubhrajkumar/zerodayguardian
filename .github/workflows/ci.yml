name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality Gate
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm install --no-fund --no-audit --prefer-offline

      - name: TypeScript typecheck
        run: npx tsc -p tsconfig.app.json --noEmit

      - name: ESLint
        run: npx eslint . --max-warnings 50

      - name: Unit tests
        run: npx vitest run --config vitest.config.mjs

      - name: Production build
        run: npx vite build

      - name: Lighthouse performance budget
        run: |
          npx serve dist -l 3456 --no-clipboard &
          sleep 3
          npx lighthouse http://localhost:3456 \
            --output=json \
            --output-path=/tmp/lighthouse-ci-report.json \
            --chrome-flags="--headless=new --no-sandbox --disable-gpu --disable-dev-shm-usage" \
            --only-categories=performance \
            --quiet
          node scripts/lighthouse-budget-check.mjs /tmp/lighthouse-ci-report.json

      - name: Upload build artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 3

      - name: Upload Lighthouse report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-report
          path: /tmp/lighthouse-ci-report.json
          retention-days: 7
          if-no-files-found: ignore
