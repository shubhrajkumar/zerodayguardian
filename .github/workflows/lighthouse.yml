name: Lighthouse Audit

on:
  # Cyber Rationale: Weekly scheduled audit catches perf regressions from dependency updates.
  schedule:
    - cron: "0 6 * * 1" # Every Monday at 06:00 UTC
  # Manual trigger with option to skip gates for hotfixes
  workflow_dispatch:
    inputs:
      skip_gates:
        description: "Skip performance gates (hotfix mode) — ⚠️ Only use for emergency deploys"
        required: false
        default: "false"
        type: boolean

env:
  NODE_VERSION_FILE: .nvmrc

jobs:
  lighthouse:
    name: Lighthouse Performance Audit
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: ${{ env.NODE_VERSION_FILE }}
          cache: npm

      - name: Install dependencies
        run: npm install --no-fund --no-audit --prefer-offline

      - name: Production build
        run: npx vite build
        env:
          NODE_ENV: production
          VITE_API_BASE_URL: https://zerodayguardian-backend.onrender.com
          VITE_SITE_URL: https://zerodayguardian-delta.vercel.app

      - name: Serve & run Lighthouse
        run: |
          npx serve dist -l 3456 --no-clipboard &
          SERVE_PID=$!
          sleep 4
          npx lighthouse http://localhost:3456 \
            --output=json \
            --output-path=/tmp/lighthouse-report.json \
            --chrome-flags="--headless=new --no-sandbox --disable-gpu --disable-dev-shm-usage" \
            --only-categories=performance \
            --throttling-method=provided \
            --quiet
          kill $SERVE_PID 2>/dev/null || true

      - name: Enforce performance budget
        if: ${{ github.event.inputs.skip_gates != 'true' }}
        run: node scripts/lighthouse-budget-check.mjs /tmp/lighthouse-report.json

      - name: Skip gates warning
        if: ${{ github.event.inputs.skip_gates == 'true' }}
        run: |
          echo "⚠️ Performance gates SKIPPED (hotfix mode)"
          echo "⚠️ This is acceptable for emergency deploys but not for regular PRs."
          echo "### ⚠️ Lighthouse Gates Skipped (Hotfix Mode)" >> $GITHUB_STEP_SUMMARY

      - name: Generate audit summary
        if: always()
        run: |
          echo "## 🔍 Lighthouse Performance Audit" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f /tmp/lighthouse-report.json ]; then
            node -e "
              const fs = require('fs');
              const r = JSON.parse(fs.readFileSync('/tmp/lighthouse-report.json','utf8'));
              const score = Math.round((r.categories?.performance?.score ?? 0) * 100);
              const a = r.audits || {};
              console.log('| Metric | Value |');
              console.log('|--------|-------|');
              console.log('| Performance Score | ' + score + '/100 |');
              console.log('| LCP | ' + (a['largest-contentful-paint']?.displayValue || 'N/A') + ' |');
              console.log('| CLS | ' + (a['cumulative-layout-shift']?.displayValue || 'N/A') + ' |');
              console.log('| TBT | ' + (a['total-blocking-time']?.displayValue || 'N/A') + ' |');
              console.log('| FCP | ' + (a['first-contentful-paint']?.displayValue || 'N/A') + ' |');
              console.log('| INP | ' + (a['interaction-to-next-paint']?.displayValue || 'N/A') + ' |');
            " >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ Lighthouse report not generated" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload Lighthouse report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-report
          path: /tmp/lighthouse-report.json
          retention-days: 30
          if-no-files-found: ignore
